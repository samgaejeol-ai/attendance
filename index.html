// 현재 시각 기준 자동 펼칠 그룹 결정
function getAutoOpenGroup() {
  var h = new Date().getHours();
  var m = new Date().getMinutes();
  var t = h * 60 + m;
  if (t < 14 * 60 + 55) return "2:25";
  if (t < 16 * 60 + 20) return "3:25";
  return "4:50";
}

function isMiddleSchool(className) { return /^M\d/.test(className.trim()); }
function isElementary(className) { return !isMiddleSchool(className); }
function pad2(n) { return (n < 10 ? "0" : "") + n; }
function todayKey(d) { return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
function mondayOf(date) {
  var d = new Date(date);
  var dow = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - dow);
  d.setHours(0, 0, 0, 0);
  return d;
}
function weekKey(date) { return todayKey(mondayOf(date)); }
function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

var _CACHE_KEY = "attendance_cache_v1";
try {
  var cached = localStorage.getItem(_CACHE_KEY);
  if (cached) {
    var cdata = JSON.parse(cached);
    state.meta = cdata.meta || {};
    state.fridayInfo = cdata.fridayInfo || {};
    state.attendance = cdata.attendance || {};
    state.roster = cdata.roster || {};
    state.studentOverride = cdata.studentOverride || {};
    state.extraStudents = cdata.extraStudents || {};
    initCollapsedGroups();
    state.loaded = true;
    render();
  }
} catch(e) {}

// 키별로 내가 쓰는 중인지 추적
var _selfWritingKeys = {};
var _debounceTimers = {};

onValue(stateRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    // 내가 쓰는 중인 키는 Firebase 데이터로 덮어쓰지 않음
    if (!_selfWritingKeys["meta"])          state.meta = data.meta || {};
    if (!_selfWritingKeys["fridayInfo"])     state.fridayInfo = data.fridayInfo || {};
    if (!_selfWritingKeys["attendance"])     state.attendance = data.attendance || {};
    if (!_selfWritingKeys["roster"])         state.roster = data.roster || {};
    if (!_selfWritingKeys["studentOverride"]) state.studentOverride = data.studentOverride || {};
    if (!_selfWritingKeys["extraStudents"])  state.extraStudents = data.extraStudents || {};
    try { localStorage.setItem(_CACHE_KEY, JSON.stringify(data)); } catch(e) {}
  }
  if (state.collapsedGroups === null) initCollapsedGroups();
  state.loaded = true;
  render();
});

// 즉시 저장 (명단 추가/삭제 등 즉각 반영 필요한 경우)
function syncToFirebaseNow(key) {
  if (_debounceTimers[key]) { clearTimeout(_debounceTimers[key]); delete _debounceTimers[key]; }
  _selfWritingKeys[key] = true;
  const updates = {};
  updates["state/" + key] = state[key];
  update(ref(db), updates).then(function() {
    // 저장 완료 후 2초간 더 보호 (Firebase onValue 지연 대응)
    setTimeout(function() { delete _selfWritingKeys[key]; }, 2000);
  }).catch(function() { delete _selfWritingKeys[key]; });
}

// debounce: 1.5초 동안 추가 변경 없으면 Firebase에 한 번에 저장
function syncToFirebase(key) {
  if (_debounceTimers[key]) clearTimeout(_debounceTimers[key]);
  _debounceTimers[key] = setTimeout(function() {
    _selfWritingKeys[key] = true;
    const updates = {};
    updates["state/" + key] = state[key];
    update(ref(db), updates).then(function() {
      setTimeout(function() { delete _selfWritingKeys[key]; }, 2000);
    }).catch(function() { delete _selfWritingKeys[key]; });
    delete _debounceTimers[key];
  }, 1500);
}

function findClass(name) {
  for (var i = 0; i < RAW_CLASSES.length; i++) {
    if (RAW_CLASSES[i].className === name) return RAW_CLASSES[i];
  }
  return null;
}

function allStudents(className) {
  var cls = findClass(className);
  var overrides = (state.studentOverride || {})[className] || {};
  var base = cls ? cls.students.filter(function(st) {
    return rosterStatus(className, st.name) !== "quit";
  }).map(function(st) {
    return overrides[st.name] ? Object.assign({}, st, overrides[st.name]) : st;
  }) : [];
  var extra = (state.extraStudents[className] || []).filter(function(st) {
    return rosterStatus(className, st.name) !== "quit";
  });
  return base.concat(extra);
}

function rosterStatus(className, studentName) {
  return ((state.roster[className] || {})[studentName]) || "active";
}

function activeStudents(className) {
  return allStudents(className).filter(function(s) {
    return rosterStatus(className, s.name) === "active";
  });
}

function updateStudentInfo(className, oldName, patch) {
  var extra = (state.extraStudents[className] || []);
  var idx = extra.findIndex(function(st) { return st.name === oldName; });
  if (idx !== -1) {
    extra[idx] = Object.assign({}, extra[idx], patch);
    syncToFirebase("extraStudents");
  } else {
    if (!state.studentOverride) state.studentOverride = {};
    if (!state.studentOverride[className]) state.studentOverride[className] = {};
    state.studentOverride[className][oldName] = Object.assign(
      {}, state.studentOverride[className][oldName] || {}, patch
    );
    syncToFirebase("studentOverride");
  }
  if (patch.name && patch.name !== oldName) {
    if (state.roster[className] && state.roster[className][oldName] !== undefined) {
      state.roster[className][patch.name] = state.roster[className][oldName];
      delete state.roster[className][oldName];
      syncToFirebase("roster");
    }
  }
}

function setRosterStatus(className, studentName, rStatus) {
  if (!state.roster[className]) state.roster[className] = {};
  state.roster[className][studentName] = rStatus;
  syncToFirebaseNow("roster"); // 즉시 저장
}

function addStudent(className, name, school, grade, note) {
  if (!state.extraStudents[className]) state.extraStudents[className] = [];
  state.extraStudents[className].push({ name: name.trim(), school: school.trim(), grade: grade, note: note || "" });
  syncToFirebaseNow("extraStudents"); // 즉시 저장 (debounce 없음)
}

function setStudentStatus(className, studentName, status, memo) {
  var dKey = todayKey(state.date);
  if (!state.attendance[dKey]) state.attendance[dKey] = {};
  if (!state.attendance[dKey][className]) state.attendance[dKey][className] = {};
  var prevMemo = (state.attendance[dKey][className][studentName] || {}).memo || "";
  state.attendance[dKey][className][studentName] = { status: status, memo: memo !== undefined ? memo : prevMemo };
  syncToFirebase("attendance");
}

function clearStudentStatus(className, studentName) {
  var dKey = todayKey(state.date);
  if (state.attendance[dKey] && state.attendance[dKey][className]) {
    delete state.attendance[dKey][className][studentName];
    syncToFirebase("attendance");
  }
}

function updateMeta(className, patch) {
  state.meta[className] = Object.assign({}, state.meta[className] || {}, patch);
  syncToFirebase("meta");
}

function updateFriday(className, patch) {
  var wKey = weekKey(state.date);
  if (!state.fridayInfo[wKey]) state.fridayInfo[wKey] = {};
  state.fridayInfo[wKey][className] = Object.assign({}, state.fridayInfo[wKey][className] || {}, patch);
  syncToFirebase("fridayInfo");
}

// ===== 반 이동 기능 =====
function transferStudents(fromClass, studentNames, toClass) {
  studentNames.forEach(function(sname) {
    // 원래 반에서 학생 정보 가져오기
    var allSts = allStudents(fromClass);
    var student = allSts.find(function(s) { return s.name === sname; });
    if (!student) return;
    // 새 반에 추가 (extraStudents)
    addStudent(toClass, student.name, student.school || "", student.grade || "", student.note || "");
    // 원래 반에서 퇴원 처리
    var isExtra = (state.extraStudents[fromClass] || []).some(function(s) { return s.name === sname; });
    if (isExtra) {
      state.extraStudents[fromClass] = state.extraStudents[fromClass].filter(function(s) { return s.name !== sname; });
      syncToFirebase("extraStudents");
    } else {
      setRosterStatus(fromClass, sname, "quit");
    }
  });
}

function computeDayCounts() {
  var dKey = todayKey(state.date);
  var dayData = state.attendance[dKey] || {};
  var counts = { present: 0, late: 0, absent: 0, video: 0, total: 0 };
  RAW_CLASSES.forEach(function(c) {
    var classData = dayData[c.className] || {};
    activeStudents(c.className).forEach(function(st) {
      counts.total++;
      var rec = classData[st.name];
      if (rec && counts.hasOwnProperty(rec.status)) counts[rec.status]++;
    });
  });
  return counts;
}

function renderDaySummary(counts) {

}

function renderFilterView() {
  var dKey = todayKey(state.date);
  var dayData = state.attendance[dKey] || {};
  var fs = state.filterStatus;
  var st = STATUS[fs];
  var results = [];
  RAW_CLASSES.forEach(function(c) {
    var classData = dayData[c.className] || {};
    activeStudents(c.className).forEach(function(student) {
      var rec = classData[student.name];
      if (rec && rec.status === fs) results.push({ cls: c, student: student, rec: rec });
    });
  });
  var html = '<div style="padding:12px 16px 0;">';
  if (results.length === 0) {
    html += '<div style="text-align:center;padding:40px 0;color:#a8a29e;font-size:13px;">' + st.emoji + ' ' + st.label + ' 학생이 없습니다.</div>';
  } else {
    html += '<div style="font-size:12px;font-weight:700;color:#a8a29e;margin-bottom:10px;padding-left:2px;">' + st.label + ' ' + results.length + '명</div><div style="display:flex;flex-direction:column;gap:7px;">';
    results.forEach(function(r) {
      var needCall = (fs === "absent" || fs === "late") && !r.rec.memo;
      html += '<div style="padding:10px 12px;border-radius:11px;border:1px solid ' + st.border + ';background:' + st.bg + ';"><div style="display:flex;align-items:center;justify-content:space-between;"><div><div style="font-weight:700;font-size:14.5px;">' + escapeHtml(r.student.name) + '<span style="font-size:11px;color:' + st.color + ';font-weight:700;margin-left:6px;">' + st.label + '</span></div><div style="font-size:11.5px;color:#a8a29e;margin-top:2px;">' + escapeHtml(r.cls.className) + (r.student.school ? (" · " + escapeHtml(r.student.school)) : "") + (r.student.grade ? (" " + r.student.grade + "학년") : "") + '</div></div>' + (needCall ? '<span style="font-size:11px;font-weight:700;color:#dc2626;background:#fef2f2;padding:3px 7px;border-radius:6px;">☏ 연락필요</span>' : "") + '</div>' + (r.rec.memo ? '<div style="margin-top:6px;font-size:12px;color:#57534e;background:rgba(0,0,0,0.04);padding:5px 8px;border-radius:6px;">✎ ' + escapeHtml(r.rec.memo) + '</div>' : "") + '</div>';
    });
    html += '</div>';
  }
  return html + '</div>';
}

function renderClassListArea() {
  var q = state.search.trim().toLowerCase();
  var filtered = RAW_CLASSES.filter(function(c) {
    if (!q) return true;
    if (c.className.toLowerCase().indexOf(q) !== -1) return true;
    return allStudents(c.className).some(function(s) { return s.name.indexOf(state.search.trim()) !== -1; });
  });

  // 그룹별로 분류
  var groups = {};
  TIME_GROUPS.forEach(function(g) { groups[g.key] = []; });
  filtered.forEach(function(c) {
    var gk = getGroupKey(c);
    if (!groups[gk]) groups[gk] = [];
    groups[gk].push(c);
  });

  var html = '<div style="padding:12px 16px 0;">';
  if (filtered.length === 0) {
    html += '<div style="text-align:center;padding:40px 0;color:#a8a29e;font-size:13px;">검색 결과가 없어요.</div>';
  }
  TIME_GROUPS.forEach(function(g) {
    var list = groups[g.key];
    if (!list || list.length === 0) return;
    var collapsed = state.collapsedGroups[g.key];
    html += '<div class="group-header" data-action="toggleGroup" data-group="' + g.key + '">' +
      '<span class="group-header-label">' + escapeHtml(g.label) + '</span>' +
      '<span class="group-toggle' + (collapsed ? " collapsed" : "") + '">▼</span>' +
      '</div>';
    html += '<div class="group-body' + (collapsed ? " collapsed" : "") + '" data-group-body="' + g.key + '">';
    html += '<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:18px;">';
    list.forEach(function(c) { html += renderClassRow(c); });
    html += '</div></div>';
  });
  return html + '</div>';
}

  var nativeBadge = (elem && m.nativeDay) ? '<span style="font-size:10.5px;font-weight:700;color:#2563eb;background:#eff6ff;padding:2px 6px;border-radius:5px;">원어민 ' + escapeHtml(m.nativeDay) + '</span>' : "";
  var dow = state.date.getDay();
  var wKey = weekKey(state.date);
  var friInfo = ((state.fridayInfo[wKey] || {})[c.className] || {});
  var friBadge = "";
  if (dow === 5 && !isMiddleSchool(c.className)) {
    if (friInfo.order === "room-first") friBadge = '<span style="font-size:10.5px;font-weight:700;color:#1d4ed8;background:#dbeafe;padding:2px 6px;border-radius:5px;">🔵 교실먼저</span>';
    else if (friInfo.order === "lab-first") friBadge = '<span style="font-size:10.5px;font-weight:700;color:#15803d;background:#dcfce7;padding:2px 6px;border-radius:5px;">🟢 랩실먼저</span>';
  }
  var elemDaysBadge = "";
  if (c.days === "월화수목금" && m.elemDays) {
    var edColor = m.elemDays === "월수" ? "#0369a1" : "#7e22ce";
    var edBg = m.elemDays === "월수" ? "#e0f2fe" : "#f3e8ff";
    elemDaysBadge = '<span style="font-size:10.5px;font-weight:700;color:' + edColor + ';background:' + edBg + ';padding:2px 6px;border-radius:5px;">📅 ' + m.elemDays + '</span>';
  }
  return '<button class="classRowBtn" data-action="openClass" data-class="' + escapeHtml(c.className) + '" style="display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;border:1px solid #e7e5e4;background:#fff;text-align:left;width:100%;">' +
    '<div style="width:4px;height:30px;border-radius:2px;background:' + badge.color + ';flex-shrink:0;"></div>' +
    '<div style="flex:1;min-width:0;">' +
      '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">' +
        '<span style="font-weight:700;font-size:14.5px;">' + escapeHtml(c.className) + '</span>' +
        '<span style="font-size:10.5px;font-weight:700;color:' + badge.color + ';background:' + badge.bg + ';padding:2px 6px;border-radius:5px;">' + escapeHtml(badge.label) + '</span>' +
        nativeBadge + elemDaysBadge + friBadge +
      '</div>' +
      '<div style="font-size:12px;color:#a8a29e;margin-top:2px;">학생 ' + activeStudents(c.className).length + '명' + (m.room ? (" · " + escapeHtml(m.room) + "호") : " · 교실 미입력") + '</div>' +
    '</div>' +
    '<span style="color:#d6d3d1;font-size:18px;">›</span></button>';
}

function renderListView() {

  var counts = computeDayCounts();
  var html = '<div style="position:sticky;top:0;z-index:10;background:#fafaf9;border-bottom:1px solid #e7e5e4;padding:14px 16px 12px;">' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">' +
      '<div style="font-size:13px;font-weight:700;color:#a8a29e;letter-spacing:1px;">출석부</div>' +
      renderHeaderDate() +
      '<button class="navbtn" data-action="openFriday" style="position:relative;' + (dow === 5 ? "background:#fff7ed;" : "") + '">' +
        '<span style="font-size:15px;color:' + (dow === 5 ? "#ea580c" : "#a8a29e") + ';">⇄</span>' +
        (dow === 5 ? '<span style="position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:4px;background:#ea580c;"></span>' : "") +

// ===== 반 이동 UI =====
function renderTransferTargetSelect(fromClass, excludeStudents) {
  var html = '<select id="transferTargetSelect" style="width:100%;padding:9px 10px;border-radius:8px;border:1px solid #bfdbfe;font-size:13px;background:#fff;">' +
    '<option value="">-- 이동할 반 선택 --</option>';
  var groups = {};
  var order = ["2:25", "3:25", "4:50", "월수금", "화목금"];
  RAW_CLASSES.forEach(function(c) {
    if (c.className === fromClass) return;
    var gk = getGroupKey(c);
    if (!groups[gk]) groups[gk] = [];
    groups[gk].push(c);
  });
  order.forEach(function(gk) {
    if (!groups[gk] || groups[gk].length === 0) return;
    html += '<optgroup label="' + escapeHtml(gk) + '">';
    groups[gk].forEach(function(c) {
      html += '<option value="' + escapeHtml(c.className) + '">' + escapeHtml(c.className) + '</option>';
    });
    html += '</optgroup>';
  });
  html += '</select>';
  return html;
}

function renderClassView() {
  var cls = findClass(state.activeClassName);
  if (!cls) { state.view = "list"; return renderListView(); }

  var actives = activeStudents(cls.className);
  var allSts = allStudents(cls.className);
  var counts = {};
  STATUS_ORDER.forEach(function(s) { counts[s] = actives.filter(function(st) { return dayData[st.name] && dayData[st.name].status === s; }).length; });
  var uncalled = actives.filter(function(st) { var rec = dayData[st.name]; return rec && (rec.status === "absent" || rec.status === "late") && !rec.memo; });

  var html = '<div style="position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e7e5e4;padding:12px 16px;">' +
    '<div style="display:flex;align-items:center;gap:10px;">' +
      '<button class="navbtn" data-action="backToList" style="width:32px;">‹</button>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-weight:800;font-size:16.5px;letter-spacing:-0.2px;">' + escapeHtml(cls.className) + '</div>' +
        '<div style="font-size:12px;color:#a8a29e;">' + (state.date.getMonth() + 1) + '월 ' + state.date.getDate() + '일 (' + DOW_LABEL[dow] + ') · 학생 ' + actives.length + '명</div>' +
      '</div>' +
      '<button data-action="toggleTransferMode" style="padding:6px 10px;border-radius:8px;border:1px solid ' + (state.transferMode ? "#2563eb" : "#e7e5e4") + ';background:' + (state.transferMode ? "#eff6ff" : "#fff") + ';font-size:12px;font-weight:700;color:' + (state.transferMode ? "#2563eb" : "#78716c") + ';">⇄ 반이동</button>' +
    '</div>';

  // 이동 모드 UI
  if (state.transferMode) {
    var selectedCount = Object.keys(state.transferSelected).filter(function(k) { return state.transferSelected[k]; }).length;
    html += '<div style="margin-top:10px;background:#eff6ff;border-radius:10px;padding:10px 12px;">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +

        '<div style="display:flex;gap:6px;">' +
          '<button data-action="transferSelectAll" style="padding:4px 10px;border-radius:7px;border:1px solid #bfdbfe;background:#fff;font-size:11.5px;font-weight:700;color:#2563eb;">전체선택</button>' +
          '<button data-action="transferSelectNone" style="padding:4px 10px;border-radius:7px;border:1px solid #e7e5e4;background:#fff;font-size:11.5px;font-weight:700;color:#78716c;">선택해제</button>' +
        '</div>' +
      '</div>' +
      renderTransferTargetSelect(cls.className, []) +
      '<button data-action="confirmTransfer" style="width:100%;margin-top:8px;padding:9px 0;border-radius:8px;background:#2563eb;color:#fff;font-size:13px;font-weight:700;' + (selectedCount === 0 ? "opacity:0.4;" : "") + '">선택한 ' + selectedCount + '명 이동</button>' +
    '</div>';
  }

  html += '<div style="display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;align-items:flex-start;">';

  }
  if (elem) {
    html += '<div style="position:relative;display:inline-block;"><button class="chip ' + (m.nativeDay ? "active-blue" : "") + '" data-action="toggleNativeMenu">📶 ' + (m.nativeDay ? ("원어민 " + escapeHtml(m.nativeDay)) : "원어민 요일 설정") + '</button><div id="nativeMenu" style="display:none;position:absolute;top:32px;left:0;z-index:20;background:#fff;border:1px solid #e7e5e4;border-radius:10px;padding:8px;box-shadow:0 4px 16px rgba(0,0,0,0.08);">' +

    NATIVE_ORDERS.forEach(function(ord) {

  }

  html += '<div style="display:flex;gap:5px;margin-top:10px;">';

// 이벤트 위임: root에 한 번만 등록, 중복 등록 없음
var _eventsAttached = false;
function attachEvents() {
  if (!_eventsAttached) {
    _eventsAttached = true;

    root.addEventListener("click", function(e) {
      var el = e.target.closest("[data-action]");
      if (!el) return;
      var action = el.getAttribute("data-action");
      if (action === "middleFriRoomInput" || action === "memoInput") return;
      handleAction(action, el, e);
    });

    root.addEventListener("blur", function(e) {
      var el = e.target.closest("[data-action='middleFriRoomInput']");
      if (!el) return;
      updateFriday(el.getAttribute("data-class"), { middleRoom: el.value.trim() });
    }, true);

    root.addEventListener("keydown", function(e) {
      var el = e.target.closest("[data-action='middleFriRoomInput']");
      if (el && e.key === "Enter") {
        updateFriday(el.getAttribute("data-class"), { middleRoom: el.value.trim() });
        el.blur();
      }
    });
  }

  var searchInput = document.getElementById("searchInput");
  if (searchInput) {
    searchInput.addEventListener("compositionstart", function() { searchInput._composing = true; });
    searchInput.addEventListener("compositionend", function() { searchInput._composing = false; state.search = searchInput.value; refreshClassList(); });
    searchInput.addEventListener("input", function() { if (!searchInput._composing) { state.search = searchInput.value; refreshClassList(); } });
  }

  // memoInput: 매번 새로 render되므로 getElementById로 직접 처리
  var memoInput = document.getElementById("memoInput");
  if (memoInput) {
    memoInput.focus();
    memoInput.setSelectionRange(memoInput.value.length, memoInput.value.length);
  }
}

// memoInput keydown은 위임으로 처리
root.addEventListener("keydown", function(e) {
  if (e.target && e.target.id === "memoInput" && e.key === "Enter") {
    var student = e.target.getAttribute("data-student");
    var rec = (state.attendance[todayKey(state.date)] || {})[state.activeClassName] || {};
    setStudentStatus(state.activeClassName, student, (rec[student] || {}).status, e.target.value.trim());
    state.memoOpenFor = null; render();
  }
});

function refreshClassList() {
  var listArea = document.getElementById("classListArea");
  if (!listArea) return;
  listArea.innerHTML = state.filterStatus ? renderFilterView() : renderClassListArea();
}

function handleAction(action, el, e) {
  if (action === "openClass") {
    state.listScrollY = window.scrollY;
    state.activeClassName = el.getAttribute("data-class");
    state.memoOpenFor = null; state.view = "class"; render(); return;
  } else if (action === "toggleGroup") {
    var gk = el.getAttribute("data-group");
    state.collapsedGroups[gk] = !state.collapsedGroups[gk];
    refreshClassList(); return;
  } else if (action === "toggleFilter") {
    var newStatus = el.getAttribute("data-status") || null;
    state.filterStatus = (state.filterStatus === newStatus) ? null : newStatus;
    refreshClassList();
    var summaryEl = document.getElementById("daySummary");
    if (summaryEl) summaryEl.innerHTML = renderDaySummary(computeDayCounts());
    return;
  }
  if (action === "shiftDate") {
    var d = new Date(state.date); d.setDate(d.getDate() + parseInt(el.getAttribute("data-delta"), 10));
    state.date = d; state.filterStatus = null; render();
  } else if (action === "goToday") {
    state.date = new Date(); state.filterStatus = null; render();
  } else if (action === "openFriday") { state.view = "friday"; render();
  } else if (action === "openClass") {
    state.listScrollY = window.scrollY;
    state.activeClassName = el.getAttribute("data-class"); state.memoOpenFor = null; state.view = "class"; render();
  } else if (action === "backToList") {
    state.view = "list"; state._restoreScroll = true;
    state.transferMode = false; state.transferSelected = {}; state.singleTransferOpen = null;
    render();
  } else if (action === "toggleGroup") {
    var gk = el.getAttribute("data-group");
    state.collapsedGroups[gk] = !state.collapsedGroups[gk];
    refreshClassList();
  } else if (action === "editRoom") {
    var cls = findClass(state.activeClassName);
    showInlineEdit((state.meta[cls.className] || {}).room || "", "예: 302", function(val) { updateMeta(cls.className, { room: val.trim() }); render(); });
  } else if (action === "editFriRoom") {
    var cls2 = findClass(state.activeClassName);
    showInlineEdit(((state.fridayInfo[weekKey(state.date)] || {})[cls2.className] || {}).middleRoom || "", "예: 305", function(val) { updateFriday(cls2.className, { middleRoom: val.trim() }); render(); });
  } else if (action === "toggleElemDays") {
    var cur = (state.meta[state.activeClassName] || {}).elemDays;
    updateMeta(state.activeClassName, { elemDays: cur === "월수" ? "화목" : cur === "화목" ? null : "월수" }); render();
  } else if (action === "toggleNativeMenu") {
    var menu = document.getElementById("nativeMenu");
    if (menu) menu.style.display = (menu.style.display === "none" || !menu.style.display) ? "flex" : "none";
  } else if (action === "setNativeDay") { updateMeta(state.activeClassName, { nativeDay: el.getAttribute("data-day") }); render();
  } else if (action === "clearNativeDay") { updateMeta(state.activeClassName, { nativeDay: "" }); render();
  } else if (action === "toggleRosterMenu") {
    var sname = el.getAttribute("data-student");
    state.rosterMenuFor = (state.rosterMenuFor === sname) ? null : sname; render();
  } else if (action === "setRoster") {
    var rsVal = el.getAttribute("data-rs"), rsStudent = el.getAttribute("data-student");
    if (rsVal === "quit") {
      if (!confirm('"' + rsStudent + '" 학생을 퇴원 처리합니다. 명단에서 삭제하시겠어요?')) return;
      if (state.extraStudents[state.activeClassName]) {
        state.extraStudents[state.activeClassName] = state.extraStudents[state.activeClassName].filter(function(st) { return st.name !== rsStudent; });
        syncToFirebaseNow("extraStudents");
      }
      if (RAW_CLASSES.some(function(c) { return c.className === state.activeClassName && c.students.some(function(st) { return st.name === rsStudent; }); })) {
        setRosterStatus(state.activeClassName, rsStudent, "quit");
      }
    } else setRosterStatus(state.activeClassName, rsStudent, rsVal);
    state.rosterMenuFor = null; render();
  } else if (action === "startEditStudent") { state.editingStudent = el.getAttribute("data-student"); state.rosterMenuFor = null; render();
  } else if (action === "cancelEditStudent") { state.editingStudent = null; render();
  } else if (action === "confirmEditStudent") {
    var oldName = el.getAttribute("data-student");
    var newName = document.getElementById("editName_" + oldName) ? document.getElementById("editName_" + oldName).value.trim() : oldName;
    if (!newName) { alert("이름을 입력해주세요."); return; }
    updateStudentInfo(state.activeClassName, oldName, {
      name: newName,
      school: document.getElementById("editSchool_" + oldName) ? document.getElementById("editSchool_" + oldName).value.trim() : "",
      grade: document.getElementById("editGrade_" + oldName) ? (parseInt(document.getElementById("editGrade_" + oldName).value) || "") : "",
      note: document.getElementById("editNote_" + oldName) ? document.getElementById("editNote_" + oldName).value.trim() : ""
    });
    state.editingStudent = null; render();
  } else if (action === "startAddStudent") {
    state.addingStudent = true; render();
    document.getElementById("newStudentName") && document.getElementById("newStudentName").focus();
  } else if (action === "cancelAddStudent") { state.addingStudent = false; render();
  } else if (action === "confirmAddStudent") {
    var newName = document.getElementById("newStudentName") ? document.getElementById("newStudentName").value.trim() : "";
    if (!newName) { alert("이름을 입력해주세요."); return; }
    // 같은 이름으로 퇴원 처리된 경우 roster에서 제거 후 재등록
    if (state.roster[state.activeClassName] && state.roster[state.activeClassName][newName] === "quit") {
      delete state.roster[state.activeClassName][newName];
      syncToFirebaseNow("roster");
    }
    addStudent(state.activeClassName, newName,
      document.getElementById("newStudentSchool") ? document.getElementById("newStudentSchool").value : "",
      document.getElementById("newStudentGrade") ? parseInt(document.getElementById("newStudentGrade").value) || "" : "");
    state.addingStudent = false; render();
  } else if (action === "toggleFridayOrder") {
    var fri2 = (state.fridayInfo[weekKey(state.date)] || {})[state.activeClassName] || {};
    updateFriday(state.activeClassName, { order: fri2.order === "room-first" ? "lab-first" : "room-first" }); render();
  } else if (action === "cycleStatus") {
    if (e.target.closest("[data-action='clearStatus']")) return;
    var student = el.getAttribute("data-student");
    var rec = ((state.attendance[todayKey(state.date)] || {})[state.activeClassName] || {})[student];
    var nextStatus = STATUS_ORDER[((rec ? STATUS_ORDER.indexOf(rec.status) : -1) + 1) % STATUS_ORDER.length];
    setStudentStatus(state.activeClassName, student, nextStatus);
    state.memoOpenFor = (nextStatus === "absent" || nextStatus === "late") ? student : null; render();
  } else if (action === "clearStatus") {
    e.stopPropagation(); clearStudentStatus(state.activeClassName, el.getAttribute("data-student")); render();
  } else if (action === "openMemo") { state.memoOpenFor = el.getAttribute("data-student"); render();
  } else if (action === "saveMemo") {
    var student3 = el.getAttribute("data-student");
    setStudentStatus(state.activeClassName, student3,
      (((state.attendance[todayKey(state.date)] || {})[state.activeClassName] || {})[student3] || {}).status,
      document.getElementById("memoInput") ? document.getElementById("memoInput").value.trim() : "");
    state.memoOpenFor = null; render();
  } else if (action === "setFridayOrder") {
    updateFriday(el.getAttribute("data-class"), { order: el.getAttribute("data-order") }); render();
  // ===== 반 이동 액션 =====
  } else if (action === "toggleTransferMode") {
    state.transferMode = !state.transferMode;
    state.transferSelected = {};
    state.singleTransferOpen = null;
    render();
  } else if (action === "toggleTransferSelect") {
    var sname2 = el.getAttribute("data-student");
    state.transferSelected[sname2] = !state.transferSelected[sname2];
    render();
  } else if (action === "transferSelectAll") {
    activeStudents(state.activeClassName).forEach(function(s) { state.transferSelected[s.name] = true; });
    render();
  } else if (action === "transferSelectNone") {
    state.transferSelected = {}; render();
  } else if (action === "confirmTransfer") {
    var selected = Object.keys(state.transferSelected).filter(function(k) { return state.transferSelected[k]; });
    if (selected.length === 0) { alert("이동할 학생을 선택해주세요."); return; }
    var targetEl = document.getElementById("transferTargetSelect");
    var target = targetEl ? targetEl.value : "";
    if (!target) { alert("이동할 반을 선택해주세요."); return; }
    if (!confirm(selected.join(", ") + "\n\n위 " + selected.length + "명을 [" + target + "]으로 이동합니다.")) return;
    transferStudents(state.activeClassName, selected, target);
    state.transferMode = false; state.transferSelected = {}; render();
  } else if (action === "singleTransfer") {
    state.singleTransferOpen = el.getAttribute("data-student");
    state.rosterMenuFor = null; render();
  } else if (action === "cancelSingleTransfer") {
    state.singleTransferOpen = null; render();
  } else if (action === "confirmSingleTransfer") {
    var sname3 = el.getAttribute("data-student");
    var targetEl2 = document.getElementById("transferTargetSelect");
    var target2 = targetEl2 ? targetEl2.value : "";
    if (!target2) { alert("이동할 반을 선택해주세요."); return; }
    if (!confirm('"' + sname3 + '"을 [' + target2 + ']으로 이동합니다.')) return;
    transferStudents(state.activeClassName, [sname3], target2);
    state.singleTransferOpen = null; render();
  }
}

function showInlineEdit(currentValue, placeholder, onSave) {
  var area = document.getElementById("inlineEditArea");
  if (!area) return;
  area.innerHTML = '<div style="display:flex;gap:6px;margin-top:8px;">' +
    '<input id="inlineEditInput" value="' + escapeHtml(currentValue) + '" placeholder="' + escapeHtml(placeholder) + '" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid #e7e5e4;font-size:13px;" />' +
    '<button id="inlineEditSave" style="padding:0 12px;border-radius:8px;background:#1c1917;color:#fff;font-size:12.5px;font-weight:700;">저장</button>' +
    '<button id="inlineEditCancel" style="padding:0 10px;border-radius:8px;border:1px solid #e7e5e4;background:#fff;font-size:12.5px;color:#78716c;">취소</button></div>';
  var input = document.getElementById("inlineEditInput");
  input.focus(); input.setSelectionRange(input.value.length, input.value.length);
  document.getElementById("inlineEditSave").addEventListener("click", function() { onSave(input.value); });
  document.getElementById("inlineEditCancel").addEventListener("click", function() { area.innerHTML = ""; });
  input.addEventListener("keydown", function(ev) { if (ev.key === "Enter") onSave(input.value); if (ev.key === "Escape") area.innerHTML = ""; });
}

render();
</script>
</body>
